<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register Guru - HadirLy</title>
        <link rel="icon" type="image/png" href="logohadirly2.png" />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
            rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

        <style>
            :root {
                --primary: #6366f1;
                --primary-dark: #4f46e5;
                --secondary: #64748b;
                --success: #10b981;
                --danger: #ef4444;
                --bg: #f1f5f9;
                --white: #ffffff;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Plus Jakarta Sans', sans-serif;
            }

            body {
                background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .register-container {
                width: 100%;
                max-width: 450px;
                perspective: 1000px;
            }

            .register-card {
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(10px);
                padding: 40px 30px;
                border-radius: 24px;
                box-shadow:
                    0 20px 25px -5px rgba(0, 0, 0, 0.1),
                    0 10px 10px -5px rgba(0, 0, 0, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.5);
                text-align: center;
            }

            .brand-section {
                margin-bottom: 30px;
            }

            .brand-logo {
                font-size: 32px;
                font-weight: 800;
                color: var(--primary);
                letter-spacing: -1px;
                margin-bottom: 5px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }

            .brand-logo i {
                font-size: 28px;
            }

            .brand-section p {
                color: var(--secondary);
                font-size: 14px;
            }

            /* Video Styling */
            .video-container {
                position: relative;
                width: 100%;
                aspect-ratio: 1 / 1; /* Kotak sempurna agar fokus ke wajah */
                max-width: 280px;
                margin: 0 auto 25px;
                border-radius: 50%; /* Bulat seperti aplikasi modern */
                overflow: hidden;
                border: 5px solid var(--white);
                box-shadow: 0 0 0 4px var(--primary);
                background: #1e293b;
            }

            video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform: scaleX(-1);
            }

            .scan-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(
                    to bottom,
                    transparent,
                    rgba(99, 102, 241, 0.2),
                    transparent
                );
                animation: scan 2s linear infinite;
                pointer-events: none;
                display: none;
            }

            @keyframes scan {
                0% {
                    transform: translateY(-100%);
                }
                100% {
                    transform: translateY(100%);
                }
            }

            #status-info {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
                font-weight: 700;
                padding: 8px 16px;
                border-radius: 50px;
                margin-bottom: 25px;
                transition: all 0.3s;
            }

            .status-loading {
                background: #fee2e2;
                color: var(--danger);
            }
            .status-success {
                background: #d1fae5;
                color: var(--success);
            }

            /* Form Styling */
            .input-group {
                position: relative;
                margin-bottom: 18px;
                text-align: left;
            }

            .input-group i {
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--secondary);
                transition: 0.3s;
            }

            input {
                width: 100%;
                padding: 14px 15px 14px 45px;
                border: 2px solid #e2e8f0;
                border-radius: 14px;
                font-size: 15px;
                outline: none;
                transition: all 0.3s;
                background: var(--white);
            }

            input:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            }

            input:focus + i {
                color: var(--primary);
            }

            button {
                width: 100%;
                padding: 16px;
                background: var(--primary);
                color: white;
                border: none;
                border-radius: 14px;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.3s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                margin-top: 10px;
            }

            button:hover:not(:disabled) {
                background: var(--primary-dark);
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            }

            button:disabled {
                background: #cbd5e1;
                cursor: not-allowed;
                transform: none;
            }

            .login-link {
                margin-top: 25px;
                font-size: 14px;
                color: var(--secondary);
            }

            .login-link a {
                color: var(--primary);
                text-decoration: none;
                font-weight: 700;
            }

            /* Mobile Adjustments */
            @media (max-width: 480px) {
                .register-card {
                    padding: 30px 20px;
                    border-radius: 0; /* Full screen di HP kecil */
                }
                body {
                    padding: 0;
                    background: var(--white);
                }
                .register-container {
                    height: 100vh;
                }
                .register-card {
                    height: 100%;
                    border: none;
                    box-shadow: none;
                }
            }
        </style>
    </head>
    <body>
        <div class="register-container">
            <div class="register-card">
                <div class="brand-section">
                    <div class="brand-logo">
                        <i class="fas fa-face-smile-wink"></i>
                        HadirLy
                    </div>
                    <p>Sistem Absensi Wajah Masa Kini</p>
                </div>

                <div class="video-container">
                    <video id="webcam" autoplay muted playsinline></video>
                    <div id="scanLine" class="scan-overlay"></div>
                </div>

                <div id="status-info" class="status-loading">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <span id="status-text">Memuat model AI...</span>
                </div>

                <form id="formRegister">
                    <div class="input-group">
                        <input type="text" id="nip" name="nip" placeholder="NIP / NISN" required />
                        <i class="fas fa-id-card"></i>
                    </div>

                    <div class="input-group">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Buat Kata Sandi"
                            required />
                        <i class="fas fa-lock"></i>
                    </div>

                    <input type="hidden" id="face_descriptor" name="face_descriptor" />

                    <button type="submit" id="btnSubmit" disabled>
                        <i class="fas fa-user-plus"></i>
                        <span id="btnText">Tunggu Deteksi Wajah</span>
                    </button>
                </form>

                <div class="login-link">
                    Sudah punya akun?
                    <a href="login.html">Masuk di sini</a>
                </div>
            </div>
        </div>

        <script>
            const video = document.getElementById('webcam');
            const statusInfo = document.getElementById('status-info');
            const statusText = document.getElementById('status-text');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnText = document.getElementById('btnText');
            const faceInput = document.getElementById('face_descriptor');
            const scanLine = document.getElementById('scanLine');

            async function loadModels() {
                // Memanggil model dari port server Node.js (3000)
                const MODEL_URL = '/models';
                try {
                    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                    statusText.innerText = 'Model Siap! Membuka Kamera...';
                    startCamera();
                } catch (err) {
                    statusText.innerText = 'Error: File Model Tidak Ditemukan!';
                    console.error(err);
                }
            }

            function startCamera() {
                navigator.mediaDevices
                    .getUserMedia({ video: { width: 400, height: 400, facingMode: 'user' } })
                    .then((stream) => {
                        video.srcObject = stream;
                        scanLine.style.display = 'block';
                    })
                    .catch((err) => {
                        statusText.innerText = 'Kamera Gagal Dibuka';
                        Swal.fire('Kamera Error', 'Mohon izinkan akses kamera.', 'error');
                    });
            }

            video.addEventListener('play', () => {
                setInterval(async () => {
                    const detection = await faceapi
                        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks()
                        .withFaceDescriptor();
                    if (detection) {
                        statusInfo.className = 'status-success';
                        statusText.innerHTML = "Wajah Terdeteksi <i class='fas fa-check'></i>";
                        // Simpan data wajah sebagai string JSON
                        faceInput.value = JSON.stringify(Array.from(detection.descriptor));
                        btnSubmit.disabled = false;
                        btnText.innerText = 'Daftar Sekarang';
                    } else {
                        statusInfo.className = 'status-loading';
                        statusText.innerText = 'Posisikan Wajah di Lingkaran';
                        btnSubmit.disabled = true;
                    }
                }, 1000);
            });

            document.getElementById('formRegister').addEventListener('submit', async (e) => {
                e.preventDefault();

                // Ambil nilai dari input yang tersedia di register.html
                const idInput = document.getElementById('nip').value;
                const passwordInput = document.getElementById('password').value;
                const faceData = document.getElementById('face_descriptor').value;

                const dataKeServer = {
                    id_nomor: idInput,
                    password: passwordInput,
                    face_vector: faceData,
                };

                try {
                    btnSubmit.disabled = true;
                    btnText.innerText = 'Memproses...';

                    const response = await fetch('https://hadirly-backend.vercel.app/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dataKeServer),
                    });

                    const result = await response.json();

                    if (result.success) {
                        Swal.fire('Berhasil!', result.message, 'success').then(
                            () => (window.location.href = 'login.html')
                        );
                    } else {
                        Swal.fire('Gagal', result.message, 'error');
                        btnSubmit.disabled = false;
                        btnText.innerText = 'Daftar Sekarang';
                    }
                } catch (error) {
                    Swal.fire('Error', 'Server tidak merespon (Node.js mati?).', 'error');
                    btnSubmit.disabled = false;
                }
            });

            loadModels();
        </script>
    </body>
</html>
