<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HadirLy - Login</title>
    <link rel="icon" type="image/png" href="logohadirly2.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
    --primary-navy:#19295c;
    --accent-blue:#3b82f6;
    --bg-cream:#f4f8ff;
    --bg-gradient:linear-gradient(135deg,#eef5ff 0%,#fffce8 100%);
    --text-dark:#1e293b;
    --text-gray:#64748b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg-gradient);
    overflow-x:hidden;
    padding:25px;
    position:relative;
}

/* BACKGROUND BLUR */
body::before,
body::after{
    content:'';
    position:fixed;
    width:420px;
    height:420px;
    border-radius:50%;
    filter:blur(90px);
    z-index:-1;
    opacity:.22;
}

body::before{
    background:#60a5fa;
    top:-120px;
    left:-120px;
}

body::after{
    background:#fde047;
    bottom:-120px;
    right:-120px;
}

/* CONTAINER */
.container{
    width:100%;
    max-width:1250px;
    min-height:700px;

    display:flex;
    overflow:hidden;

    border-radius:35px;

    background:rgba(255,255,255,.68);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        0 25px 60px rgba(0,0,0,.08),
        inset 0 1px 0 rgba(255,255,255,.35);
}

/* ===================================
   LEFT SIDE
=================================== */
.left-side {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #d8e3f3 0%, #dbe7f8 100%);
    padding: 35px 55px 35px 35px; 
}

.left-overlay{
    position:absolute;
    inset:0;
    background: radial-gradient(circle at top left, rgba(255,255,255,.5), transparent 30%);
}

.left-content-new{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items: flex-start;
}

.mini-brand{
    margin-left: -20px;
    margin-bottom: 5px;
}

.mini-brand img{
    width:160px;
    display: block;
}

.hero-text {
    margin-top: 0px;     
    margin-bottom: auto;  
}

.hero-text h1{
    font-size:3.8rem;
    line-height:1.0;
    font-weight:800;
    color:#1c2d6b;
    letter-spacing:-2px;
}

.dot {
    background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
    -webkit-background-clip: text;
    background-clip: text;         
    -webkit-text-fill-color: transparent;
    color: transparent;             
    display: inline-block;
}

.hero-text p{
    margin-top:25px;
    max-width:420px;
    color:#64748b;
    font-size:1.05rem;
    line-height:1.8;
}

.left-footer{
    color:#64748b;
    font-size:0.95rem;
    margin-top: auto;
}

/* ===================================
   RIGHT SIDE
=================================== */
.right-side{
    flex:.85;

    display:flex;
    flex-direction:column;
    justify-content:center;

    padding:60px 55px;

    background:rgba(255,255,255,.78);
    backdrop-filter:blur(18px);
}

.welcome-text{
    text-align:center;

    color:var(--primary-navy);

    font-size:3rem;
    line-height:1.15;

    font-weight:800;

    margin-bottom:12px;
}

.sub-text{
    text-align:center;
    color:var(--text-gray);

    font-size:1rem;
    line-height:1.7;

    margin-bottom:40px;
}

/* FORM */
.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;

    margin-bottom:10px;

    color:var(--text-dark);

    font-weight:600;
    font-size:.92rem;
}

.input-wrapper{
    position:relative;
}

.prefix-icon{
    position:absolute;
    top:50%;
    left:18px;

    transform:translateY(-50%);

    color:#94a3b8;
}

.input-wrapper input{
    width:100%;

    height:60px;

    border-radius:18px;
    border:2px solid #e2e8f0;

    padding:0 50px;

    background:rgba(255,255,255,.9);

    font-size:.95rem;

    outline:none;

    transition:.3s;
}

.input-wrapper input:focus{
    border-color:var(--accent-blue);

    box-shadow:
        0 0 0 4px rgba(59,130,246,.08),
        0 10px 25px rgba(59,130,246,.10);
}

#togglePassword{
    position:absolute;

    top:50%;
    right:18px;

    transform:translateY(-50%);

    color:#94a3b8;

    cursor:pointer;
}

/* LINK */
.forgot-link{
    display:block;

    text-align:right;

    margin-top:-5px;
    margin-bottom:28px;

    color:var(--accent-blue);

    text-decoration:none;

    font-size:.9rem;
    font-weight:600;
}

/* BUTTON */
.btn-login{
    width:100%;
    height:60px;

    border:none;
    border-radius:18px;

    background:var(--primary-navy);

    color:white;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.btn-login:hover{
    transform:translateY(-2px);

    box-shadow:0 15px 30px rgba(25,41,92,.22);
}

/* REGISTER */
.register-text{
    text-align:center;

    margin-top:28px;

    color:var(--text-gray);

    font-size:.95rem;
}

.register-text a{
    color:var(--accent-blue);

    text-decoration:none;

    font-weight:700;
}

/* FOOTER */
.footer-logo{
    margin-top:35px;
    text-align:center;
}

.footer-logo img{
    height:45px;
    opacity:.8;

    filter:
        drop-shadow(0 4px 10px rgba(0,0,0,.08));

    transition:.3s;
}

.footer-logo img:hover{
    opacity:1;
    transform:scale(1.03);
}

/* ===================================
   MOBILE
=================================== */
@media(max-width:950px){

    body{
        padding:15px;
    }

    .container{
        flex-direction:column;
        min-height:auto;
        border-radius:28px;
    }

    .left-side{
        min-height:380px;
        padding:50px 25px;
    }

    .right-side{
        padding:45px 28px;
    }

    .main-logo{
        width:170px;
    }

    .brand-text h2{
        font-size:1.5rem;
    }

    .brand-text p{
        font-size:.92rem;
        line-height:1.8;
    }
    .main-logo{
    width:230px;
    margin-bottom:0px; /* sebelumnya 12px */
    animation:floatLogo 4s ease-in-out infinite;
    filter: drop-shadow(0 10px 25px rgba(25,41,92,.12));
}

.brand-text{
    margin-top:-10px; /* bikin tulisan naik mendekati logo */
}

.brand-text h2{
    color:var(--primary-navy);
    font-size:2.3rem;
    font-weight:800;
    margin-bottom:6px;
    line-height:1.15;
}


    .welcome-text{
        font-size:2.2rem;
    }

    .sub-text{
        margin-bottom:30px;
    }

    .floating-card{
        width:190px;
        padding:10px 12px;
    }

    .card-1{
        top:25px;
        left:20px;
    }

    .card-2{
        top:110px;
        left:20px;
    }
}

@media(max-width:600px){

    .container{
        border-radius:24px;
    }

    .left-side{
        display:none;
    }

    .right-side{
        width:100%;
        padding:40px 22px;
    }

    .welcome-text{
        font-size:1.9rem;
    }

    .sub-text{
        font-size:.92rem;
        margin-bottom:30px;
    }

    .input-wrapper input{
        height:56px;
        font-size:.9rem;
    }

    .btn-login{
        height:56px;
    }
}
</style>

</head>
<body>
    <div class="container">
        <div class="left-side">
        <div class="left-overlay"></div>
        <div class="left-content-new">
            <!-- Logo atas -->
            <div class="mini-brand">
                <img src="logohadirly.png" alt="Logo HadirLy">
            </div>
            <!-- Teks besar -->
            <div class="hero-text">
                <h1>Mulai Hari Ini dengan <span class="dot">Satu Klik....</span></h1>
                <p>
                    Masuk ke sistem absensi untuk
                    mengelola kehadiran secara lebih mudah,
                    cepat, dan terintegrasi.
                </p>
            </div>

            <!-- Footer bawah -->
            <div class="left-footer">
                ©2026 Platform Sistem HadirLy.
            </div>
        </div>
    </div>

        <div class="right-side">
            <h2 class="welcome-text">SELAMAT DATANG</h2>
            <p class="sub-text">Silakan login untuk mengakses sistem absensi.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>NIP/NISN</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user prefix-icon"></i>
                        <input type="text" name="username" placeholder="Masukkan NIP/NISN" required />
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Kata Sandi</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock prefix-icon"></i>
                        <input type="password" id="password" name="password" placeholder="Masukkan Kata Sandi" required />
                        <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; cursor: pointer; color: #94a3b8;"></i>
                    </div>
                </div>

                <a href="lupa_password.html" class="forgot-link">Lupa Sandi?</a>
                <button type="submit" class="btn-login">MASUK</button>
                
                <p class="register-text">
                    Belum punya akun? <a href="register.html">Daftar sekarang</a>
                </p>
            </form>

            <div class="footer-logo">
                <img src="logotetra.png" alt="TETRATECH" />
            </div>
        </div>
    </div>


        <script>
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = document.querySelector('input[name="username"]').value;
                const password = document.querySelector('input[name="password"]').value;

                try {
                    const response = await fetch('https://hadirly-backend.vercel.app/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password }),
                    });

                    const data = await response.json();

                    // ✅ PINDAH KE SINI
                    if (data.success) {
                        const userData = data.user;

                        // Simpan info user utama ke localStorage
                        const userToSave = {
                            nama: userData.nama,
                            role: userData.role,
                            nip: userData.nip,
                            nisn: userData.nisn,
                            email: userData.email,
                            no_hp: userData.no_hp,
                            mapel: userData.mapel,
                            id_kelas: userData.id_kelas,
                            kelas: userData.kelas,
                        };

                        localStorage.setItem("currentUser", JSON.stringify(userToSave));

                        if (userData.role === 'guru') {
                        window.location.href = 'dashboard_guru.html';
                    } 
                    else if (userData.role === 'siswa') {
                        window.location.href = 'dashboard_siswa.html';
                    } 
                    else if (userData.role === 'admin') {
                        window.location.href = 'admin.html';
                    }


                        const currentPath = window.location.pathname.substring(
                            0,
                            window.location.pathname.lastIndexOf('/') + 1
                        );

                        const targetUrl = window.location.origin + currentPath + data.redirect;

                        console.log('Mengarahkan ke:', targetUrl);
                        window.location.href = targetUrl;
                        } else {

                       // --- LOGIKA LOGIN GAGAL ---
                        Swal.fire({
                        icon: 'error',
                        title: 'Login Gagal',
                        text: data.message || 'Username atau Password salah!',
                        confirmButtonColor: '#19295C'
                        });

                        }
                        } catch (error) {
                        // --- LOGIKA SERVER ERROR ---
                        console.error('Error Koneksi:', error);
                        Swal.fire({
                        icon: 'warning',
                        title: 'Server Tidak Merespon',
                        text: 'Pastikan terminal sudah menjalankan "node server.js"',
                        confirmButtonColor: '#19295C'
                        });

                        }
                        });
                        document.addEventListener('DOMContentLoaded', function() {
                        const togglePassword = document.querySelector('#togglePassword');
                        const passwordInput = document.querySelector('#password');

                        if (togglePassword && passwordInput) {
                            togglePassword.addEventListener('click', function() {
                                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                                passwordInput.setAttribute('type', type);
                                this.classList.toggle('fa-eye-slash');
                            });
                        }
                    });
            </script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </body>
</html>
